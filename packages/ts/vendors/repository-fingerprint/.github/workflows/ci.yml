name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    name: bash (shellcheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck packages/bash/repo-fingerprint.sh packages/bash/tests/*.sh
      - name: bash tests
        run: |
          for t in packages/bash/tests/*.sh; do
            echo "== $t =="
            bash "$t"
          done

  powershell:
    name: powershell (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up python (for schema validation in report test)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install jsonschema into a venv
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install jsonschema
      - name: powershell tests
        shell: pwsh
        run: |
          foreach ($t in Get-ChildItem packages/powershell/tests/*.ps1) {
            Write-Host "== $($t.FullName) =="
            & $t.FullName
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

  ts:
    name: typescript (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json
      - name: install
        working-directory: packages/ts
        run: npm ci
      - name: typecheck
        working-directory: packages/ts
        run: npm run typecheck
      - name: build
        working-directory: packages/ts
        run: npm run build
      - name: test
        working-directory: packages/ts
        run: npm test

  py:
    name: python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install
        run: python -m pip install -e "packages/py[test]"
      - name: test
        run: python -m pytest packages/py

  parity:
    name: polyglot parity
    runs-on: ubuntu-latest
    needs: [bash, powershell, ts, py]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: build ts
        working-directory: packages/ts
        run: |
          npm ci
          npm run build
      - name: install py
        run: python -m pip install -e "packages/py[test]"
      - name: goldens are up to date
        run: node scripts/gen-goldens.mjs --check
      - name: parity matrix
        run: node scripts/parity.mjs
