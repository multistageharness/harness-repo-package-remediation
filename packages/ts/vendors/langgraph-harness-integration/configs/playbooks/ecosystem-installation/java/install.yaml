# java ecosystem installation playbook (0026/D2). Steps run with cwd at the
# install location, so a rule-1 aggregator root installs once and Maven/Gradle
# own their internal module fan-out. `-DskipTests` / `-x test`: install resolves
# and locks dependencies; testing is not this stage's job. The gradle lane
# prefers the repo-local wrapper (guard is cwd-relative) and falls back to
# `gradle` on PATH — the same discipline as step 11 (0018 A1 §6).
ecosystem: java
toolchains:
  maven: &maven_steps
    - tool: mvn-install
      argv: ["mvn", "-B", "install", "-DskipTests"]
      guard: mvn
      artifact: mvn-install.log
      allowNonZero: true
  gradle:
    - tool: gradlew-build
      argv: ["./gradlew", "build", "-x", "test"]
      guard: "./gradlew"
      artifact: gradle-build.log
      allowNonZero: true
      fallback:
        tool: gradle-build
        argv: ["gradle", "build", "-x", "test"]
        guard: gradle
        artifact: gradle-build.log
        allowNonZero: true
  default: *maven_steps
